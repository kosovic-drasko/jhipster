  <h4 id="page-heading" data-cy="SubjectsHeading">

        <mat-icon>close</mat-icon>
      </button>
    </mat-form-field>
    <!--    <input type="text" class="form-control" [(ngModel)]="imePredmeta" (keyup)="loadPageByNameSubject()" />-->
    <!--    <div class="input-group">-->
    <!--      <input class="form-control border-end-0 border rounded-pill" type="text" value="search" id="example-search-input"[(ngModel)]="imePredmeta" (keyup)="loadPageByNameSubject()">-->
    <!--      <span class="input-group-append">-->
    <!--                <button class="btn btn-outline-secondary bg-white border-start-0 border rounded-pill ms-n3" type="button" (click)="imePredmetaNull()" (click)="loadPage()">-->
    <!--                    <i class="fa fa-search"></i>-->
    <!--                </button>-->
    <!--            </span>-->
    <!--    </div>-->
    <!--    <div >-->
    <!--      <input class="form-control " type="search" value="search" id="example-search-input" [(ngModel)]="imePredmeta" (keyup)="loadPageByNameSubject()">-->

    <!--              <button class="btn btn-outline-secondary border-left-0 border" type="button" (click)="imePredmetaNull()" (click)="loadPage()">-->
    <!--                    <i class="fa fa-search"></i>-->
    <!--              </button>-->

    <!--    </div>-->
    <!--        <button class="btn btn-info" (keyup)="loadPageByNameSubject()">nadji</button>-->
    <div class="d-flex justify-content-end">
      <button class="btn btn-info me-2" (click)="loadPage()" [disabled]="isLoading">
        <fa-icon icon="sync" [spin]="isLoading"></fa-icon>
        <span jhiTranslate="jhipsterApp.subjects.home.refreshListLabel">Refresh List</span>
      </button>

      <button
        id="jh-create-entity"
        data-cy="entityCreateButton"
        class="btn btn-primary jh-create-entity create-subjects"
        [routerLink]="['/subjects/new']"
      >
        <fa-icon icon="plus"></fa-icon>
        <span jhiTranslate="jhipsterApp.subjects.home.createLabel"> Create a new Subjects </span>
      </button>
    </div>
  </h4>

  <jhi-alert-error></jhi-alert-error>

  <jhi-alert></jhi-alert>

  <div class="alert alert-warning" id="no-result" *ngIf="subjects?.length === 0">
    <span jhiTranslate="jhipsterApp.subjects.home.notFound">No subjects found</span>
  </div>

  <div class="table-responsive" id="entities" *ngIf="subjects && subjects.length > 0">
    <table class="table table-striped" aria-describedby="page-heading">
      <thead>
        <tr jhiSort [(predicate)]="predicate" [(ascending)]="ascending" (sortChange)="loadPage()">
          <th scope="col" jhiSortBy="id"><span jhiTranslate="global.field.id">ID</span> <fa-icon icon="sort"></fa-icon></th>
          <th scope="col" jhiSortBy="subjectName">
            <span jhiTranslate="jhipsterApp.subjects.subjectName">Subject Name</span> <fa-icon icon="sort"></fa-icon>
          </th>
          <th scope="col" jhiSortBy="numberSemestars">
            <span jhiTranslate="jhipsterApp.subjects.numberSemestars">Number Semestars</span> <fa-icon icon="sort"></fa-icon>
          </th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let subjects of subjects; trackBy: trackId" data-cy="entityTable">
          <td>
            <a [routerLink]="['/subjects', subjects.id, 'view']">{{ subjects.id }}</a>
          </td>
          <td>{{ subjects.subjectName }}</td>
          <td>{{ subjects.numberSemestars }}</td>

          <td class="text-end">
            <div class="btn-group">
              <button
                type="submit"
                [routerLink]="['/subjects', subjects.id, 'view']"
                class="btn btn-info btn-sm"
                data-cy="entityDetailsButton"
              >
                <fa-icon icon="eye"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.view">View</span>
              </button>

              <button
                type="submit"
                [routerLink]="['/subjects', subjects.id, 'edit']"
                class="btn btn-primary btn-sm"
                data-cy="entityEditButton"
              >
                <fa-icon icon="pencil-alt"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Edit</span>
              </button>

              <button type="submit" (click)="delete(subjects)" class="btn btn-danger btn-sm" data-cy="entityDeleteButton">
                <fa-icon icon="times"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Delete</span>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td></td>
          <td>Sum</td>
          <td>{{ ukupno }}</td>
        </tr>
      </tfoot>
    </table>
  </div>

  <div *ngIf="subjects && subjects.length > 0">
    <div class="d-flex justify-content-center">
      <jhi-item-count [params]="{ page: page, totalItems: totalItems, itemsPerPage: itemsPerPage }"></jhi-item-count>
    </div>

    <div class="d-flex justify-content-center">
      <ngb-pagination
        [collectionSize]="totalItems"
        [(page)]="ngbPaginationPage"
        [pageSize]="itemsPerPage"
        [maxSize]="5"
        [rotate]="true"
        [boundaryLinks]="true"
        (pageChange)="loadPage($event)"
      ></ngb-pagination>
    </div>
  </div>
</div>
