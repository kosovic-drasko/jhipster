<form *ngIf="subjects" name="deleteForm" (ngSubmit)="confirmDelete(subjects.id!)">
  <div class="modal-header">
    <h4 class="modal-title" data-cy="subjectsDeleteDialogHeading" jhiTranslate="entity.delete.title">Confirm delete operation</h4>
  </div>

  <div class="modal-body">
    <jhi-alert-error></jhi-alert-error>

    <p id="jhi-delete-subjects-heading" jhiTranslate="jhipsterApp.subjects.delete.question" [translateValues]="{ id: subjects.id }">
      Are you sure you want to delete this Subjects?
    </p>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" data-dismiss="modal" (click)="cancel()">
      <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Cancel</span>
    </button>

    <button id="jhi-confirm-delete-subjects" data-cy="entityConfirmDeleteButton" type="submit" class="btn btn-danger">
      <fa-icon icon="times"></fa-icon>&nbsp;<span jhiTranslate="entity.action.delete">Delete</span>
    </button>
  </div>
</form>
