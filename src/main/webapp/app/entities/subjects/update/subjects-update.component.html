{{ hide }}
<mat-dialog-content class="mat-typography">
  <div class="col-8">
    <form name="editForm" role="form" novalidate [formGroup]="editForm">
      <h2 id="jhi-subjects-heading" data-cy="SubjectsCreateUpdateHeading" jhiTranslate="jhipsterApp.subjects.home.createOrEditLabel">
        Create or edit a Subjects
      </h2>

      <div>
        <jhi-alert-error></jhi-alert-error>
        <div class="form-floating">
          <input
            placeholder="Naziv Predmeta"
            type="text"
            class="form-control"
            name="subjectName"
            id="field_subjectName"
            data-cy="subjectName"
            formControlName="subjectName"
          />
          <label class="form-label" jhiTranslate="jhipsterApp.subjects.subjectName" for="field_subjectName">Subject Name</label>
          <div *ngIf="editForm.get('subjectName')!.invalid && (editForm.get('subjectName')!.dirty || editForm.get('subjectName')!.touched)">
            <small
              class="form-text text-danger"
              *ngIf="editForm.get('subjectName')?.errors?.required"
              jhiTranslate="entity.validation.required"
            >
              This field is required.
            </small>
          </div>
        </div>

        <div class="form-floating">
          <input
            type="number"
            placeholder="No Semestars"
            class="form-control"
            name="numberSemestars"
            id="field_numberSemestars"
            data-cy="numberSemestars"
            formControlName="numberSemestars"
          />
          <label class="form-label" jhiTranslate="jhipsterApp.subjects.numberSemestars" for="field_numberSemestars">Number Semestars</label>
          <div
            *ngIf="
              editForm.get('numberSemestars')!.invalid &&
              (editForm.get('numberSemestars')!.dirty || editForm.get('numberSemestars')!.touched)
            "
          >
            <small
              class="form-text text-danger"
              *ngIf="editForm.get('numberSemestars')?.errors?.required"
              jhiTranslate="entity.validation.required"
            >
              This field is required.
            </small>
            <small
              class="form-text text-danger"
              [hidden]="!editForm.get('numberSemestars')?.errors?.number"
              jhiTranslate="entity.validation.number"
            >
              This field should be a number.
            </small>
          </div>
        </div>
      </div>
    </form>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <div>
    <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="onSaveSuccess()">
      <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Cancel</span>
    </button>

    <button
      [hidden]="editForm.get('id')!.value == null"
      (click)="save()"
      id="save-entity"
      data-cy="entityCreateSaveButton"
      [disabled]="editForm.invalid || isSaving"
      class="btn btn-primary"
    >
      <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Save</span>
    </button>
    <button
      [hidden]="editForm.get('id')!.value !== null"
      (click)="confirmAdd()"
      id="add-entity"
      data-cy="entityCreateSaveButton"
      [disabled]="editForm.invalid || isSaving"
      class="btn btn-info"
    >
      <fa-icon icon="add"></fa-icon>&nbsp;<span jhiTranslate="entity.action.add">Add</span>
    </button>
  </div>
</mat-dialog-actions>
