<div class="modal-content">
  <div class="d-flex justify-content-center">
    <div class="col-8">
      <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
        <h2 id="jhi-dialog-heading" data-cy="DialogCreateUpdateHeading" jhiTranslate="jhipsterApp.dialog.home.createOrEditLabel">
          Create or edit a Dialog
        </h2>

        <div>
          <jhi-alert-error></jhi-alert-error>

          <div class="form-floating" [hidden]="editForm.get('id')!.value == null">
            <input
              type="number"
              class="form-control"
              name="id"
              id="field_id"
              data-cy="id"
              formControlName="id"
              placeholder="id"
              [readonly]="true"
            />
            <label class="form-label" jhiTranslate="global.field.id" for="field_id">ID</label>
          </div>

          <div class="form-floating">
            <input type="text" class="form-control" name="name" id="field_name" placeholder="Name" data-cy="name" formControlName="name" />
            <label class="form-label" jhiTranslate="jhipsterApp.dialog.name" for="field_name">Name</label>
          </div>
        </div>

        <div>
          <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
            <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Cancel</span>
          </button>

          <button
            type="submit"
            id="save-entity"
            data-cy="entityCreateSaveButton"
            [disabled]="editForm.invalid || isSaving"
            class="btn btn-primary"
          >
            <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Save</span>
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
